---
stages:
  - ⚒️tool_creation
  - 🎉lint
  - 🚀deploy

variables:
  ANSIBLE_PYTHON_INTERPRETER: /usr/bin/python3
  ANSIBLE_REMOTE_TMP: /tmp
  ANSIBLE_FORCE_COLOR: 'true'
  ANSIBLE_STARATEGY: linear
  ANSIBLE_PIPELINING: "1"
  ANSIBLE_TRANSPORT: ssh
  ANSIBLE_BECOME_METHOD: sudo
  ANSIBLE_BECOME_USER: root
  ANSIBLE_BECOME_ASKPASS: 'false'
  ANSIBLE_FORCE_HANDLER: 'true'
  ANSIBLE_ASK_PASS: 'false'
  ANSIBLE_NOCOWS: "1"
  ANSIBLE_STDOUT_CALLBACK: "yaml"
  ANSIBLE_RESULT_FORMAT: yaml
  ANSIBLE_HOST_KEY_CHECKING: 'false'
  DEPRECATION_WARNINGS: 'false'
  ANSIBLE_TIMEOUT: 30
  HOSTS_FILE: hosts.yml

.job_inj:
  before_script:
    - eval $(ssh-agent -s)
    - echo "$SSH_ROOT_PRIVATE_KEY" | tr -d '\r' | ssh-add -


image: registry.gitlab.com/ansible_playbooks7843206/best_practices_alpine/ee:docker

🔨generate_inventory:
  stage: ⚒️tool_creation
  tags:
    - Docker
  variables:
    SERVER_IPS: 193.164.14.5
    SERVER_NAMES: gitlab
  extends: .job_inj
  script:
    - |
      if [ -f "$HOSTS_FILE" ]; then
        echo "Using existing hosts.yml file"
      else
        echo "Generating dynamic hosts.yml file"
        echo "kafka:" >> hosts.yml
        echo "  hosts:" >> hosts.yml
        IFS=',' read -ra SERVER_LIST <<< "$SERVER_IPS"
        IFS=',' read -ra SERVER_NAMES <<< "$SERVER_NAMES"

        for i in "${!SERVER_LIST[@]}"; do
          server_ip="${SERVER_LIST[$i]}"
          server_name="${SERVER_NAMES[$i]:-server$((i+1))}"
          echo "    $server_name:" >> hosts.yml
          echo "      ansible_host: $server_ip" >> hosts.yml
          echo "      ansible_ssh_user: $SSH_USER" >> hosts.yml
        done

        echo "Файл '$HOSTS_FILE' успешно создан и заполнен."
      fi
    - |
      if [ -f requirements1.yml ]; then
        echo "Installing roles from requirements1.yml..."
        ansible-galaxy install -r requirements1.yml --ignore-errors -p roles/ --force
      else
        echo "No requirements.yml found, creating example..."
        cat > requirements1.yml << EOF
        # roles from GitLab
        - src: 'https://oauth2:${ANSIBLE_TOKEN}@gitlab.com/ansible_playbooks7843206/docker.git'
          version: main
          name: docker
          scm: 'git'
      EOF

        ansible-galaxy install -r requirements1.yml -p roles/ --force
      fi
      echo "Installed roles:"
      ls -la roles/

  artifacts:
    paths:
      - $HOSTS_FILE
      - roles/
    expire_in: 1 hour


# Проверка синтаксиса и стиля кода
🎉ansible_lint_test:
  stage: 🎉lint
  dependencies:
    - 🔨generate_inventory
  extends: .job_inj
  tags:
    - Docker
  script:
    - export ANSIBLE_VAULT_PASSWORD_FILE=$ANSIBLE_VAULT_PASSWORD
    - ansible --version
    - ansible-lint --version
    - ansible-lint -q --offline
    - ansible all -i hosts.yml -m ping


🚀deploy_01:
  stage: 🚀deploy
  tags:
    - Docker
  extends: .job_inj
  when: manual
  dependencies:
    - 🎉ansible_lint_test
    - 🔨generate_inventory
  script:
    - |
      echo "Current directory structure:"
      ls -la

      echo "Inventory file:"
      cat hosts.yml

      echo "Running playbook..."
      ansible-playbook -i hosts.yml playbook.yml --vault-password-file $ANSIBLE_VAULT_PASSWORD
